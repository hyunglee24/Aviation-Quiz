<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>항공사 시험 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --navy2: #0f2044;
    --blue: #1a3a6e;
    --sky: #2563eb;
    --sky-light: #3b82f6;
    --gold: #f59e0b;
    --gold-light: #fbbf24;
    --white: #ffffff;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-400: #94a3b8;
    --gray-600: #475569;
    --green: #10b981;
    --red: #ef4444;
    --correct: #d1fae5;
    --correct-border: #10b981;
    --wrong: #fee2e2;
    --wrong-border: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 배경 효과 ── */
  .bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(37,99,235,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(245,158,11,0.10) 0%, transparent 60%);
  }

  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 45%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 80%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 90% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 75%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 70%, rgba(255,255,255,0.2) 0%, transparent 100%);
  }

  .app-wrap {
    position: relative; z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    min-height: 100vh;
  }

  /* ── 헤더 ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    font-size: 28px; line-height: 1;
  }
  .logo-text {
    font-size: 18px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--white) 0%, var(--gold-light) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-sub {
    font-size: 11px; font-weight: 400; color: var(--gray-400);
    -webkit-text-fill-color: var(--gray-400);
  }

  /* ── 탭 ── */
  .tabs {
    display: flex; gap: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .tab-btn {
    flex: 1; padding: 10px;
    background: none; border: none; cursor: pointer;
    border-radius: 9px;
    color: var(--gray-400);
    font-family: 'Pretendard', sans-serif;
    font-size: 14px; font-weight: 600;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--sky);
    color: var(--white);
    box-shadow: 0 4px 16px rgba(37,99,235,0.4);
  }
  .tab-btn:hover:not(.active) { color: var(--white); }

  /* ── 카드 ── */
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 20px;
    backdrop-filter: blur(8px);
  }
  .card-title {
    font-size: 15px; font-weight: 700;
    color: var(--gold-light);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── 입력 ── */
  input, textarea, select {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    resize: vertical;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--sky-light);
    background: rgba(37,99,235,0.1);
  }
  input::placeholder, textarea::placeholder { color: var(--gray-400); }
  select option { background: var(--navy2); }

  label {
    display: block;
    font-size: 12px; font-weight: 600;
    color: var(--gray-400);
    margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .field { margin-bottom: 14px; }

  /* ── 버튼 ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px;
    padding: 12px 24px;
    border: none; border-radius: 10px;
    font-family: 'Pretendard', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--sky) 0%, #1d4ed8 100%);
    color: var(--white);
    box-shadow: 0 4px 16px rgba(37,99,235,0.35);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.5); }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold) 0%, #d97706 100%);
    color: var(--navy);
    box-shadow: 0 4px 16px rgba(245,158,11,0.35);
  }
  .btn-gold:hover { transform: translateY(-1px); }
  .btn-ghost {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--white);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.13); }
  .btn-sm { padding: 8px 14px; font-size: 12px; }
  .btn-danger {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--red);
  }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
  .btn-full { width: 100%; }

  /* ── 문제 목록 ── */
  .q-list { display: flex; flex-direction: column; gap: 12px; }
  .q-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex; align-items: flex-start; gap: 14px;
  }
  .q-num {
    min-width: 28px; height: 28px;
    background: var(--sky);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .q-text-wrap { flex: 1; min-width: 0; }
  .q-text { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .q-ans { font-size: 12px; color: var(--gold-light); }
  .q-actions { display: flex; gap: 6px; align-items: center; }

  /* ── 빈 상태 ── */
  .empty {
    text-align: center;
    padding: 48px 24px;
    color: var(--gray-400);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }

  /* ── 퀴즈 화면 ── */
  .quiz-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .quiz-badge {
    background: rgba(245,158,11,0.15);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px; font-weight: 600; color: var(--gold-light);
  }

  /* 진행 바 */
  .progress-bar-wrap {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sky) 0%, var(--gold) 100%);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* 문제 카드 */
  .quiz-question-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 20px;
    backdrop-filter: blur(8px);
  }
  .quiz-question-num {
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    color: var(--sky-light);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .quiz-question-text {
    font-size: 18px; font-weight: 700; line-height: 1.6;
    margin-bottom: 0;
  }

  /* 보기 */
  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer;
    text-align: left;
    font-family: 'Pretendard', sans-serif;
    font-size: 15px; font-weight: 500;
    color: var(--white);
    transition: all 0.2s;
  }
  .option-btn:hover:not(:disabled) {
    background: rgba(37,99,235,0.15);
    border-color: var(--sky-light);
    transform: translateX(3px);
  }
  .option-btn:disabled { cursor: default; }
  .option-btn.selected-correct {
    background: rgba(16,185,129,0.15);
    border-color: var(--green);
  }
  .option-btn.selected-wrong {
    background: rgba(239,68,68,0.15);
    border-color: var(--red);
  }
  .option-btn.show-correct {
    background: rgba(16,185,129,0.08);
    border-color: rgba(16,185,129,0.4);
    color: var(--green);
  }
  .option-label {
    min-width: 28px; height: 28px;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800;
    flex-shrink: 0;
  }
  .option-btn.selected-correct .option-label { background: var(--green); color: white; }
  .option-btn.selected-wrong .option-label { background: var(--red); color: white; }
  .option-btn.show-correct .option-label { background: rgba(16,185,129,0.3); color: var(--green); }

  /* 결과 배너 */
  .result-banner {
    border-radius: 14px;
    padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
    margin-top: 16px;
    font-size: 14px; font-weight: 600;
    display: none;
  }
  .result-banner.correct {
    background: rgba(16,185,129,0.12);
    border: 1px solid rgba(16,185,129,0.3);
    color: var(--green);
    display: flex;
  }
  .result-banner.wrong {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--red);
    display: flex;
  }
  .result-icon { font-size: 22px; }

  /* 퀴즈 하단 */
  .quiz-footer {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  .score-chip {
    display: flex; align-items: center; gap: 6px;
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.25);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 14px; font-weight: 700;
    color: var(--gold-light);
  }

  /* 결과 화면 */
  .result-screen { text-align: center; padding: 12px 0; }
  .result-score-ring {
    width: 150px; height: 150px;
    margin: 0 auto 24px;
    position: relative;
  }
  .result-score-ring svg { transform: rotate(-90deg); }
  .result-score-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .result-score-num {
    font-size: 36px; font-weight: 800;
    background: linear-gradient(135deg, var(--white), var(--gold-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .result-score-label { font-size: 12px; color: var(--gray-400); }
  .result-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
  .result-sub { font-size: 14px; color: var(--gray-400); margin-bottom: 28px; }
  .result-grid {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 12px; margin-bottom: 28px;
  }
  .result-stat {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 14px;
    padding: 16px 10px;
    text-align: center;
  }
  .result-stat-num { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
  .result-stat-num.g { color: var(--green); }
  .result-stat-num.r { color: var(--red); }
  .result-stat-num.b { color: var(--sky-light); }
  .result-stat-label { font-size: 11px; color: var(--gray-400); font-weight: 500; }
  .result-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  /* PDF 업로드 영역 */
  .upload-zone {
    border: 2px dashed rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 36px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(255,255,255,0.03);
  }
  .upload-zone:hover {
    border-color: var(--sky-light);
    background: rgba(37,99,235,0.08);
  }
  .upload-zone.dragging {
    border-color: var(--gold);
    background: rgba(245,158,11,0.08);
  }
  .upload-icon { font-size: 42px; margin-bottom: 10px; }
  .upload-text { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .upload-sub { font-size: 12px; color: var(--gray-400); }
  #pdf-file-input { display: none; }

  /* 로딩 */
  .loading-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,22,40,0.85);
    backdrop-filter: blur(4px);
    z-index: 999;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,255,255,0.1);
    border-top-color: var(--sky-light);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 15px; color: var(--gray-400); }

  /* 토스트 */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: rgba(30,40,60,0.96);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px; font-weight: 600;
    z-index: 9999;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
    backdrop-filter: blur(8px);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { color: var(--green); border-color: rgba(16,185,129,0.3); }
  .toast.error { color: var(--red); border-color: rgba(239,68,68,0.3); }
  .toast.info { color: var(--sky-light); border-color: rgba(37,99,235,0.3); }

  /* 섹션 숨김 */
  .section { display: none; }
  .section.active { display: block; }

  /* 구분선 */
  .divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 20px 0;
  }

  /* 반응형 */
  @media (max-width: 600px) {
    .quiz-question-text { font-size: 16px; }
    .option-btn { font-size: 14px; padding: 13px 14px; }
    .result-grid { grid-template-columns: repeat(3,1fr); }
  }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="stars"></div>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">PDF 분석 중...</div>
</div>
<div class="toast" id="toast"></div>

<div class="app-wrap">
  <!-- 헤더 -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">✈️</div>
      <div>
        <div class="logo-text">AviationQuiz</div>
        <div class="logo-sub">항공사 시험 준비</div>
      </div>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('manage')">📋 문제 관리</button>
    <button class="tab-btn" onclick="switchTab('quiz')">🎯 퀴즈 시작</button>
  </div>

  <!-- ══ 문제 관리 섹션 ══ -->
  <div class="section active" id="section-manage">

    <!-- PDF 업로드 -->
    <div class="card">
      <div class="card-title">📄 PDF로 문제 자동 추출</div>
      <div class="upload-zone" id="upload-zone"
           onclick="document.getElementById('pdf-file-input').click()"
           ondragover="handleDragOver(event)"
           ondragleave="handleDragLeave(event)"
           ondrop="handleDrop(event)">
        <div class="upload-icon">📂</div>
        <div class="upload-text">PDF 파일을 클릭하거나 드래그해서 올려주세요</div>
        <div class="upload-sub">AI가 문제와 보기, 정답을 자동으로 인식합니다</div>
      </div>
      <input type="file" id="pdf-file-input" accept=".pdf" onchange="handlePdfUpload(event)">
    </div>

    <div style="text-align:center; font-size:13px; color:var(--gray-400); margin: -8px 0 16px;">— 또는 직접 입력 —</div>

    <!-- 직접 입력 -->
    <div class="card">
      <div class="card-title">✏️ 문제 직접 입력</div>
      <div class="field">
        <label>문제</label>
        <textarea id="q-text" rows="3" placeholder="예) 비행 중 엔진 화재 발생 시 첫 번째 조치는?"></textarea>
      </div>
      <div class="field">
        <label>① 보기 1</label>
        <input type="text" id="opt1" placeholder="보기 1">
      </div>
      <div class="field">
        <label>② 보기 2</label>
        <input type="text" id="opt2" placeholder="보기 2">
      </div>
      <div class="field">
        <label>③ 보기 3</label>
        <input type="text" id="opt3" placeholder="보기 3">
      </div>
      <div class="field">
        <label>④ 보기 4</label>
        <input type="text" id="opt4" placeholder="보기 4">
      </div>
      <div class="field">
        <label>정답</label>
        <select id="q-answer">
          <option value="">정답 선택</option>
          <option value="0">① 보기 1</option>
          <option value="1">② 보기 2</option>
          <option value="2">③ 보기 3</option>
          <option value="3">④ 보기 4</option>
        </select>
      </div>
      <button class="btn btn-primary btn-full" onclick="addQuestion()">➕ 문제 추가</button>
    </div>

    <!-- 문제 목록 -->
    <div class="card">
      <div class="card-title" style="justify-content:space-between;">
        <span>📚 등록된 문제 <span id="q-count-badge" style="background:var(--sky);border-radius:20px;padding:2px 10px;font-size:12px;margin-left:4px;">0</span></span>
        <button class="btn btn-danger btn-sm" onclick="clearAll()" id="clear-btn" style="display:none">🗑 전체 삭제</button>
      </div>
      <div class="q-list" id="q-list">
        <div class="empty">
          <div class="empty-icon">📝</div>
          <div class="empty-text">아직 등록된 문제가 없어요.<br>PDF를 업로드하거나 직접 입력해주세요.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ 퀴즈 섹션 ══ -->
  <div class="section" id="section-quiz">
    <!-- 퀴즈 대기 -->
    <div id="quiz-idle">
      <div class="card" style="text-align:center; padding: 40px 28px;">
        <div style="font-size:56px; margin-bottom:16px;">🛫</div>
        <div style="font-size:20px; font-weight:800; margin-bottom:8px;">퀴즈 준비 완료</div>
        <div style="font-size:14px; color:var(--gray-400); margin-bottom:28px;" id="quiz-ready-msg">문제 관리 탭에서 문제를 먼저 추가해주세요.</div>

        <div class="card" style="text-align:left; background:rgba(255,255,255,0.04); margin-bottom:20px;">
          <div class="field">
            <label>출제 방식</label>
            <select id="quiz-mode">
              <option value="all">전체 순서대로</option>
              <option value="random">전체 랜덤</option>
              <option value="wrong">오답만 반복</option>
            </select>
          </div>
          <div class="field" style="margin-bottom:0">
            <label>문제 수 제한</label>
            <select id="quiz-limit">
              <option value="0">전체</option>
              <option value="10">10문제</option>
              <option value="20">20문제</option>
              <option value="30">30문제</option>
            </select>
          </div>
        </div>
        <button class="btn btn-gold btn-full" onclick="startQuiz()" id="start-btn" style="font-size:16px; padding:16px;">🚀 퀴즈 시작</button>
      </div>
    </div>

    <!-- 퀴즈 진행 -->
    <div id="quiz-playing" style="display:none;">
      <div class="quiz-header">
        <div class="quiz-badge" id="quiz-progress-label">1 / 10</div>
        <button class="btn btn-ghost btn-sm" onclick="endQuiz()">종료</button>
      </div>

      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>

      <div class="quiz-question-card">
        <div class="quiz-question-num" id="q-num-label">문제 1</div>
        <div class="quiz-question-text" id="q-display-text"></div>
      </div>

      <div class="options-list" id="options-list"></div>

      <div class="result-banner" id="result-banner">
        <div class="result-icon" id="result-icon"></div>
        <div id="result-msg"></div>
      </div>

      <div class="divider"></div>

      <div class="quiz-footer">
        <div class="score-chip">
          ⭐ <span id="live-score">0</span> / <span id="live-total">0</span> 정답
        </div>
        <button class="btn btn-primary" onclick="nextQuestion()" id="next-btn" disabled>다음 문제 →</button>
      </div>
    </div>

    <!-- 결과 화면 -->
    <div id="quiz-result" style="display:none;">
      <div class="card result-screen">
        <div class="result-score-ring">
          <svg width="150" height="150" viewBox="0 0 150 150">
            <circle cx="75" cy="75" r="62" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="10"/>
            <circle cx="75" cy="75" r="62" fill="none" stroke="url(#rg)" stroke-width="10"
              stroke-dasharray="389.6" stroke-dashoffset="389.6"
              stroke-linecap="round" id="score-circle"/>
            <defs>
              <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#2563eb"/>
                <stop offset="100%" stop-color="#f59e0b"/>
              </linearGradient>
            </defs>
          </svg>
          <div class="result-score-center">
            <div class="result-score-num" id="result-pct">0%</div>
            <div class="result-score-label">정답률</div>
          </div>
        </div>
        <div class="result-title" id="result-title">수고하셨습니다!</div>
        <div class="result-sub" id="result-sub"></div>
        <div class="result-grid">
          <div class="result-stat">
            <div class="result-stat-num b" id="rs-total">0</div>
            <div class="result-stat-label">총 문제</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-num g" id="rs-correct">0</div>
            <div class="result-stat-label">정답</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-num r" id="rs-wrong">0</div>
            <div class="result-stat-label">오답</div>
          </div>
        </div>
        <div class="result-btns">
          <button class="btn btn-ghost" onclick="showIdle()">← 처음으로</button>
          <button class="btn btn-primary" onclick="startQuiz()">🔄 다시 풀기</button>
          <button class="btn btn-gold" onclick="retryWrong()" id="retry-wrong-btn">❌ 오답만</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── 상태 ──
let questions = JSON.parse(localStorage.getItem('aq-questions') || '[]');
let quizQueue = [];
let currentIdx = 0;
let score = 0;
let answered = false;
let wrongIds = new Set();
let sessionWrong = [];

// ── 저장 ──
function save() {
  localStorage.setItem('aq-questions', JSON.stringify(questions));
}

// ── 탭 전환 ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'manage') || (i === 1 && tab === 'quiz'));
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + tab).classList.add('active');
  if (tab === 'quiz') updateQuizIdle();
}

// ── 문제 목록 렌더 ──
function renderList() {
  const list = document.getElementById('q-list');
  const count = questions.length;
  document.getElementById('q-count-badge').textContent = count;
  document.getElementById('clear-btn').style.display = count > 0 ? '' : 'none';

  if (count === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">아직 등록된 문제가 없어요.<br>PDF를 업로드하거나 직접 입력해주세요.</div></div>`;
    return;
  }
  list.innerHTML = questions.map((q, i) => `
    <div class="q-item">
      <div class="q-num">${i+1}</div>
      <div class="q-text-wrap">
        <div class="q-text">${escHtml(q.text)}</div>
        <div class="q-ans">정답: ${escHtml(q.options[q.answer])}</div>
      </div>
      <div class="q-actions">
        <button class="btn btn-danger btn-sm" onclick="removeQ(${i})">🗑</button>
      </div>
    </div>
  `).join('');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 문제 추가 ──
function addQuestion() {
  const text = document.getElementById('q-text').value.trim();
  const opts = [
    document.getElementById('opt1').value.trim(),
    document.getElementById('opt2').value.trim(),
    document.getElementById('opt3').value.trim(),
    document.getElementById('opt4').value.trim(),
  ];
  const answer = document.getElementById('q-answer').value;

  if (!text) return showToast('문제를 입력해주세요.', 'error');
  if (opts.some(o => !o)) return showToast('보기를 모두 입력해주세요.', 'error');
  if (answer === '') return showToast('정답을 선택해주세요.', 'error');

  questions.push({ id: Date.now(), text, options: opts, answer: parseInt(answer) });
  save(); renderList();

  // 초기화
  document.getElementById('q-text').value = '';
  ['opt1','opt2','opt3','opt4'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('q-answer').value = '';
  showToast('문제가 추가되었습니다! ✅', 'success');
}

function removeQ(i) {
  questions.splice(i, 1);
  save(); renderList();
}

function clearAll() {
  if (!confirm('모든 문제를 삭제할까요?')) return;
  questions = []; save(); renderList();
  showToast('전체 삭제 완료', 'info');
}

// ── PDF 업로드 ──
function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.add('dragging');
}
function handleDragLeave() {
  document.getElementById('upload-zone').classList.remove('dragging');
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('dragging');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') processPdf(file);
  else showToast('PDF 파일만 지원합니다.', 'error');
}
function handlePdfUpload(e) {
  const file = e.target.files[0];
  if (file) processPdf(file);
}

async function processPdf(file) {
  showLoading('PDF 읽는 중...');
  try {
    const base64 = await fileToBase64(file);
    setLoadingText('AI가 문제를 추출하는 중...');

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'document',
              source: { type: 'base64', media_type: 'application/pdf', data: base64 }
            },
            {
              type: 'text',
              text: `이 PDF에서 4지선다 문제를 모두 추출해주세요.
반드시 아래 JSON 형식만 출력하세요. 다른 말은 하지 마세요.

[
  {
    "text": "문제 내용",
    "options": ["보기1", "보기2", "보기3", "보기4"],
    "answer": 0
  }
]

answer는 정답 보기의 인덱스(0~3)입니다.
문제가 없으면 빈 배열 []을 반환하세요.`
            }
          ]
        }]
      })
    });

    const data = await resp.json();
    const rawText = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const clean = rawText.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    if (!Array.isArray(parsed) || parsed.length === 0) {
      hideLoading();
      showToast('문제를 찾지 못했어요. PDF를 확인해주세요.', 'error');
      return;
    }

    let added = 0;
    for (const q of parsed) {
      if (q.text && Array.isArray(q.options) && q.options.length === 4 && typeof q.answer === 'number') {
        questions.push({ id: Date.now() + Math.random(), text: q.text, options: q.options, answer: q.answer });
        added++;
      }
    }
    save(); renderList(); hideLoading();
    showToast(`${added}개 문제를 추출했습니다! ✅`, 'success');
  } catch (err) {
    hideLoading();
    showToast('오류가 발생했습니다: ' + err.message, 'error');
  }
  document.getElementById('pdf-file-input').value = '';
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('파일 읽기 실패'));
    r.readAsDataURL(file);
  });
}

// ── 퀴즈 ──
function updateQuizIdle() {
  const n = questions.length;
  document.getElementById('quiz-ready-msg').textContent =
    n === 0 ? '문제 관리 탭에서 문제를 먼저 추가해주세요.' : `총 ${n}개 문제가 준비되었습니다.`;
  document.getElementById('start-btn').disabled = n === 0;
}

function startQuiz() {
  if (questions.length === 0) return showToast('문제가 없습니다.', 'error');

  const mode = document.getElementById('quiz-mode').value;
  const limit = parseInt(document.getElementById('quiz-limit').value);

  let pool = [...questions];
  if (mode === 'wrong') {
    pool = pool.filter(q => wrongIds.has(q.id));
    if (pool.length === 0) {
      showToast('오답 문제가 없습니다. 퀴즈를 먼저 풀어주세요.', 'info');
      return;
    }
  }
  if (mode === 'random' || mode === 'wrong') {
    pool.sort(() => Math.random() - 0.5);
  }
  if (limit > 0) pool = pool.slice(0, limit);

  quizQueue = pool;
  currentIdx = 0;
  score = 0;
  sessionWrong = [];

  document.getElementById('quiz-idle').style.display = 'none';
  document.getElementById('quiz-playing').style.display = 'block';
  document.getElementById('quiz-result').style.display = 'none';

  renderQuestion();
}

function renderQuestion() {
  const q = quizQueue[currentIdx];
  const total = quizQueue.length;

  document.getElementById('q-num-label').textContent = `문제 ${currentIdx + 1}`;
  document.getElementById('quiz-progress-label').textContent = `${currentIdx + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = ((currentIdx / total) * 100) + '%';
  document.getElementById('q-display-text').textContent = q.text;
  document.getElementById('live-score').textContent = score;
  document.getElementById('live-total').textContent = currentIdx;

  const labels = ['①', '②', '③', '④'];
  const ol = document.getElementById('options-list');
  ol.innerHTML = q.options.map((opt, i) => `
    <button class="option-btn" onclick="selectAnswer(${i})">
      <div class="option-label">${labels[i]}</div>
      <div>${escHtml(opt)}</div>
    </button>
  `).join('');

  const banner = document.getElementById('result-banner');
  banner.className = 'result-banner';
  answered = false;
  document.getElementById('next-btn').disabled = true;
}

function selectAnswer(chosen) {
  if (answered) return;
  answered = true;

  const q = quizQueue[currentIdx];
  const isCorrect = chosen === q.answer;
  const btns = document.querySelectorAll('.option-btn');

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('show-correct');
  });
  if (isCorrect) {
    btns[chosen].classList.remove('show-correct');
    btns[chosen].classList.add('selected-correct');
    score++;
    wrongIds.delete(q.id);
  } else {
    btns[chosen].classList.add('selected-wrong');
    wrongIds.add(q.id);
    sessionWrong.push(q);
  }

  const banner = document.getElementById('result-banner');
  const icon = document.getElementById('result-icon');
  const msg = document.getElementById('result-msg');

  if (isCorrect) {
    banner.className = 'result-banner correct';
    icon.textContent = '🎉';
    msg.textContent = '정답입니다!';
  } else {
    banner.className = 'result-banner wrong';
    icon.textContent = '❌';
    msg.innerHTML = `오답입니다. 정답: <strong>${escHtml(q.options[q.answer])}</strong>`;
  }

  document.getElementById('live-score').textContent = score;
  document.getElementById('live-total').textContent = currentIdx + 1;
  document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= quizQueue.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('quiz-playing').style.display = 'none';
  document.getElementById('quiz-result').style.display = 'block';

  const total = quizQueue.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('result-pct').textContent = pct + '%';
  document.getElementById('rs-total').textContent = total;
  document.getElementById('rs-correct').textContent = score;
  document.getElementById('rs-wrong').textContent = total - score;

  const titles = pct >= 90 ? ['완벽합니다! 🏆', '합격권입니다. 자신감을 가지세요!']
               : pct >= 70 ? ['잘 하셨어요! ✈️', '조금만 더 하면 완벽해요.']
               : pct >= 50 ? ['계속 도전하세요! 💪', '오답을 집중적으로 복습해보세요.']
               : ['다시 도전해봐요! 📚', '기초부터 차근차근 다시 풀어보세요.'];
  document.getElementById('result-title').textContent = titles[0];
  document.getElementById('result-sub').textContent = titles[1];

  // 원형 그래프
  const circumference = 2 * Math.PI * 62;
  const offset = circumference * (1 - pct / 100);
  const circle = document.getElementById('score-circle');
  circle.style.transition = 'stroke-dashoffset 1s ease';
  setTimeout(() => { circle.style.strokeDashoffset = offset; }, 100);

  document.getElementById('retry-wrong-btn').style.display =
    sessionWrong.length > 0 ? '' : 'none';
}

function retryWrong() {
  quizQueue = [...sessionWrong].sort(() => Math.random() - 0.5);
  currentIdx = 0; score = 0; sessionWrong = [];
  document.getElementById('quiz-result').style.display = 'none';
  document.getElementById('quiz-playing').style.display = 'block';
  renderQuestion();
}

function endQuiz() {
  if (!confirm('퀴즈를 종료할까요?')) return;
  showIdle();
}

function showIdle() {
  document.getElementById('quiz-idle').style.display = 'block';
  document.getElementById('quiz-playing').style.display = 'none';
  document.getElementById('quiz-result').style.display = 'none';
  updateQuizIdle();
}

// ── 유틸 ──
function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading-overlay').classList.add('show');
}
function setLoadingText(msg) {
  document.getElementById('loading-text').textContent = msg;
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.remove('show');
}

let toastTimer;
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── 초기화 ──
renderList();
updateQuizIdle();
</script>
</body>
</html>
